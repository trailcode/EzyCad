name: Windows MSVC Build and Test

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'   # trigger releases on version tags, e.g. v0.1.0
  pull_request:
    branches: [main, master]

# Grant the GITHUB_TOKEN write access so that the release step (softprops/action-gh-release)
# can create/update releases and attach the portable zip when a version tag is pushed.
# Without this (or the equivalent repo setting), the token defaults to "Contents: read"
# and the step fails with 403 "Resource not accessible by integration".
permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup MSBuild (real Visual Studio 2022 toolchain)
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'   # Visual Studio 2022

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/downloads
            ${{ github.workspace }}/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}-${{ hashFiles('.github/workflows/windows-msvc.yml') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}-

      - name: Cache OCCT prebuilt (8.0.0)
        uses: actions/cache@v4
        with:
          path: C:/occt-prebuilt
          key: ${{ runner.os }}-occt-8.0.0-vc14-64-combined
          restore-keys: |
            ${{ runner.os }}-occt-8.0.0-vc14-64-combined

      - name: Clone and bootstrap vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = "C:\vcpkg"
          $packagesDir = "$vcpkgRoot\installed"
          $downloadsDir = "$vcpkgRoot\downloads"
          $tempPackages = "$env:TEMP\vcpkg-packages-cache"
          $tempDownloads = "$env:TEMP\vcpkg-downloads-cache"
          $needsClone = -not (Test-Path "$vcpkgRoot\vcpkg.exe")
          if ($needsClone) {
            Write-Host "vcpkg tool not present (or only package cache dirs restored); preparing clean clone while preserving cached packages..."
            # Stash any packages/downloads that actions/cache restored under C:/vcpkg (so this run keeps the cache benefit)
            if (Test-Path $packagesDir) {
              if (Test-Path $tempPackages) { Remove-Item -Recurse -Force $tempPackages }
              Move-Item $packagesDir $tempPackages -Force
            }
            if (Test-Path $downloadsDir) {
              if (Test-Path $tempDownloads) { Remove-Item -Recurse -Force $tempDownloads }
              Move-Item $downloadsDir $tempDownloads -Force
            }
            if (Test-Path $vcpkgRoot) {
              Remove-Item -Recurse -Force $vcpkgRoot
            }
            git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkgRoot
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
            # Restore the stashed package cache for this run (avoids rebuilding glfw/glew/boost-geometry)
            if (Test-Path $tempPackages) {
              Move-Item $tempPackages $packagesDir -Force
            }
            if (Test-Path $tempDownloads) {
              Move-Item $tempDownloads $downloadsDir -Force
            }
          } else {
            Write-Host "vcpkg.exe already present; skipping clone/bootstrap (using cached tool + packages)"
          }

      - name: Install dependencies via vcpkg (manifest mode)
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = "C:\vcpkg"
          cd $env:GITHUB_WORKSPACE
          # vcpkg will download various tools (newer cmake, 7zip, msys2-*) if the runner's versions
          # are insufficient or if ports require Unix-like tools (e.g. perl for scripts in build).
          # This is normal on clean windows-latest images.
          # The cache step above should hit on re-runs for the downloads/ dir.
          & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet x64-windows --clean-after-build

      - name: Download and extract OCCT 8.0.0 prebuilt (combined, if cache miss)
        shell: pwsh
        run: |
          $occtRoot = "C:\occt-prebuilt"
          $configPath = "$occtRoot\opencascade-8.0.0-vc14-64\cmake\OpenCASCADEConfig.cmake"
          if (Test-Path $configPath) {
            Write-Host "OCCT prebuilt found in cache at $occtRoot"
          } else {
            Write-Host "Downloading OCCT 8.0.0 prebuilt combined package (provides OCCT + 3rdparty DLLs)..."
            New-Item -ItemType Directory -Force -Path $occtRoot | Out-Null
            $outerZip = Join-Path $env:TEMP "occt-combined-release-no-pch.zip"
            Write-Host "Using curl.exe for reliable download of V8 combined (note: V8 release asset is a wrapper zip)..."
            & curl.exe -L --max-time 300 -o $outerZip "https://github.com/Open-Cascade-SAS/OCCT/releases/download/V8_0_0/occt-combined-release-no-pch.zip"
            if ($LASTEXITCODE -ne 0) {
              Write-Error "curl.exe download of OCCT prebuilt failed (exit $LASTEXITCODE)"
              exit 1
            }
            # The V8_0_0 combined asset is itself a zip containing the real 'opencascade-8.0.0-vc14-64-combined.zip'
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            $outer = [System.IO.Compression.ZipFile]::OpenRead($outerZip)
            $innerEntry = $outer.Entries[0]
            $innerZip = Join-Path $env:TEMP $innerEntry.FullName
            $fs = New-Object System.IO.FileStream($innerZip, [System.IO.FileMode]::Create)
            $es = $innerEntry.Open()
            $es.CopyTo($fs)
            $fs.Close()
            $es.Close()
            $outer.Dispose()
            Remove-Item -Force $outerZip
            Write-Host "Extracting V8 combined to $occtRoot (this may take a minute)..."
            Expand-Archive -LiteralPath $innerZip -DestinationPath $occtRoot -Force
            Remove-Item -Force $innerZip
            if (-not (Test-Path $configPath)) {
              Write-Error "OpenCASCADEConfig.cmake not found after extraction"
              exit 1
            }
            Write-Host "OCCT prebuilt ready."
          }

      - name: Configure (Visual Studio 2022 + vcpkg toolchain)
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = "C:\vcpkg"
          cd $env:GITHUB_WORKSPACE

          # Use prebuilt OCCT (downloaded in previous step from official OCCT release zips).
          # This avoids the long source build that the vcpkg "opencascade" port performs.
          # The prebuilt matches the layout expected by the local Windows dev path in CMakeLists.txt
          # (which also relies on OCCT_3RD_PARTY_DIR for copying runtime DLLs during configure).
          $openCascadeDir = "C:\occt-prebuilt\opencascade-8.0.0-vc14-64\cmake"
          $occt3rdPartyDir = "C:\occt-prebuilt\3rdparty-vc14-64"
          if (-not (Test-Path "$openCascadeDir\OpenCASCADEConfig.cmake")) {
            Write-Error "OpenCASCADEConfig.cmake not found at $openCascadeDir (OCCT prebuilt step may have failed)"
            exit 1
          }
          Write-Host "Using OpenCASCADE_DIR=$openCascadeDir"
          Write-Host "Using OCCT_3RD_PARTY_DIR=$occt3rdPartyDir"

          # The "Visual Studio 17 2022" generator + setup-msbuild action ensures we use the real
          # Microsoft C/C++ compiler (cl.exe) and MSBuild from Visual Studio 2022.
          # The vcpkg toolchain only affects *where* libraries are found (glfw3, glew, boost-geometry); the compiler itself is the genuine MSVC one.
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DOpenCASCADE_DIR="$openCascadeDir" `
            -DOCCT_3RD_PARTY_DIR="$occt3rdPartyDir" `
            -DEZYCAD_ENABLE_PYTHON=OFF

      - name: Verify using real MS Visual Studio compiler (cl.exe / MSBuild)
        shell: pwsh
        run: |
          Write-Host "=== Generator and compiler from CMake ==="
          cmake -L build | Select-String "CMAKE_GENERATOR|CMAKE_CXX_COMPILER|CMAKE_C_COMPILER"
          Write-Host ""
          Write-Host "=== Visual Studio installation (should be 2022) ==="
          & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property displayName
          Write-Host ""
          Write-Host "=== cl.exe that will be used by the VS generator ==="
          # The VS generator locates cl.exe via the .vcxproj / MSBuild, not necessarily in PATH yet.
          # We can find the latest VS installation and show the cl.exe path.
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath
          if ($vsPath) {
            $clPath = Join-Path $vsPath "VC\Tools\MSVC"
            if (Test-Path $clPath) {
              Get-ChildItem $clPath -Directory | Sort-Object Name -Descending | Select-Object -First 1 | ForEach-Object {
                $cl = Join-Path $_.FullName "bin\Hostx64\x64\cl.exe"
                if (Test-Path $cl) {
                  Write-Host "cl.exe: $cl"
                  & $cl 2>&1 | Select-String "Version"
                }
              }
            }
          } else {
            Write-Host "Could not locate VS installation for cl.exe details (but generator is set to use it)."
          }
          Write-Host ""
          Write-Host "Note: vcpkg downloads (cmake, 7zip etc.) are only for the remaining small dependencies (glfw3, glew, boost-geometry)."
          Write-Host "OCCT uses the official prebuilt binaries (V8, cached/downloaded separately) for fast CI."
          Write-Host "The EzyCad code itself (and the vcpkg-built deps on Windows) are compiled with the real cl.exe from Visual Studio 2022."

      - name: Build Release
        shell: pwsh
        run: |
          cd $env:GITHUB_WORKSPACE
          # cmake --build with the VS generator invokes the real MSBuild + cl.exe (true Visual Studio compiler)
          cmake --build build --config Release --parallel --target EzyCad EzyCad_tests

      - name: Run unit tests
        shell: pwsh
        run: |
          cd $env:GITHUB_WORKSPACE\build
          ctest -C Release --output-on-failure -V

      - name: List produced artifacts (visible in logs)
        shell: pwsh
        run: |
          Write-Host "=== EzyCad + tests exes and top-level DLLs in build/Release ==="
          Get-ChildItem build/Release -Include *.exe,*.dll -File | Select-Object Name, Length | Format-Table -AutoSize
          Write-Host ""
          Write-Host "=== res/ and other assets (if staged) ==="
          if (Test-Path build/Release/res) { Get-ChildItem build/Release/res -Recurse | Select -First 20 FullName }
          Write-Host ""
          Write-Host "Note: the full self-contained Release tree is uploaded as artifact below."

      - name: Package portable Windows build (for releases + easy download)
        shell: pwsh
        run: |
          $ref = $env:GITHUB_REF
          if ($ref -match 'refs/tags/(v?.+)') {
            $ver = $matches[1]
          } else {
            $ver = 'dev-' + $env:GITHUB_SHA.Substring(0,7)
          }
          $zipName = "EzyCad-$ver-windows-x64.zip"
          Write-Host "Packaging portable app into $zipName"

          # Create a clean portable folder (exclude tests exe to keep user zip tidy)
          $topDir = "EzyCad"
          $stage = "pkg/$topDir"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "build/Release/*" $stage -Recurse -Exclude "*_tests*"

          Compress-Archive -Path "pkg/*" -DestinationPath $zipName -Force
          Remove-Item -Recurse -Force pkg

          # PORTABLE_ZIP is the actual .zip file (used by gh-release and as path for artifact)
          # PORTABLE_ARTIFACT_NAME is the artifact container name (without trailing .zip to avoid
          # the common "xxx.zip.zip" download name from actions/upload-artifact when the name ends in .zip)
          $artifactName = $zipName -replace '\.zip$',''
          echo "PORTABLE_ZIP=$zipName" >> $env:GITHUB_ENV
          echo "PORTABLE_ARTIFACT_NAME=$artifactName" >> $env:GITHUB_ENV
          Get-Item $zipName | Select Name, Length
          Write-Host "Zip contains a top-level '$topDir' folder with the runnable app."

      - name: Upload portable zip as artifact (easy single-file download)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PORTABLE_ARTIFACT_NAME }}
          path: ${{ env.PORTABLE_ZIP }}
          retention-days: 30

      - name: Upload Release artifacts (EzyCad.exe + DLLs + assets)
        uses: actions/upload-artifact@v4
        with:
          name: EzyCad-Windows-MSVC-Release
          path: build/Release/
          retention-days: 30
          if-no-files-found: error
        # Only upload if the build + tests succeeded. The folder should be
        # self-contained thanks to CMake's MSVC DLL/asset staging + the
        # vcpkg DLL discovery above.

      - name: Create GitHub Release + upload portable zip (only on version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: EzyCad ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ env.PORTABLE_ZIP }}
          # overwrite_files allows re-attaching/updating the zip if you delete+recreate
          # the same tag (or re-run the workflow for an existing tag) after fixes.
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # This is what most GitHub projects do for end-user downloads:
        # attach prebuilts to a tagged GitHub Release so users can download
        # directly from the Releases page without digging into Actions artifacts.
