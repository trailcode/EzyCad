# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details
#
# Dashboard automation (https://app.readthedocs.org/dashboard/ezycad/):
#   - Admin -> Integrations: connect GitHub and enable the webhook (rebuild on push).
#   - Admin -> Settings -> Builds -> enable "Build pull requests" for PR preview URLs.
#   - Admin -> Settings -> Versions: tag releases to publish /en/stable/ (latest tracks main).
#
# Published site: https://ezycad.readthedocs.io/

# Required
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

python:
  install:
    - requirements: docs/requirements.txt
